name: "checks"

on:
  pull_request:
  push:
    branches: 
      - "main"
    paths:
      - "**.nix"
      - "flake.lock"
      - ".github/workflows/checks.yml"

permissions:
  id-token: "write"
  contents: "read"

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/flake-checker-action@a0f068d37b542f3150564fbf1164fec2d958ee11 # main
        with:
          fail-mode: true
      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3
      - uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839 # main
      - name: Run nix flake check
        run: nix flake check
