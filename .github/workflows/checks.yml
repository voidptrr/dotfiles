name: "checks"

on:
  pull_request:
  push:
    branches: 
      - "main"
    paths:
      - "**.nix"
      - "flake.lock"
      - ".github/workflows/checks.yml"

permissions:
  id-token: "write"
  contents: "read"

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/flake-checker-action@a0f068d37b542f3150564fbf1164fec2d958ee11 # main
        with:
          fail-mode: true
      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3
      - uses: DeterminateSystems/magic-nix-cache-action@14645543c3b214bedad3b9b49775cb042f4c1fc7 # main
      - name: Run nix flake check
        run: nix flake check
