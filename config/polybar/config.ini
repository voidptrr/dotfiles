[colors]
background = #1f1f28
background-alt = #2a2a37
foreground = #dcd7ba
muted = #7f8490
accent = #e6c384
urgent = #c34043
good = #98bb6c

[bar/base]
width = 100%
height = 30
radius = 0
fixed-center = true
line-size = 2
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = Source Code Pro:size=13;2
font-1 = Source Code Pro:size=14;2
border-size = 0
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.muted}
wm-restack = generic
override-redirect = false
enable-ipc = true

[bar/top]
inherit = bar/base
bottom = false
modules-left = date i3
modules-center = xwindow
modules-right = pulseaudio battery network cpu memory tray

[module/i3]
type = internal/i3
pin-workspaces = true
enable-click = true
enable-scroll = true
index-sort = true
wrapping-scroll = false
label-focused = %name%
label-focused-foreground = ${colors.foreground}
label-focused-underline = ${colors.accent}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 2
label-visible = %name%
label-visible-background = ${colors.background-alt}
label-visible-foreground = ${colors.foreground}
label-visible-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.urgent}
label-urgent-foreground = #ffffff
label-urgent-padding = 2
label-separator = " "
label-separator-foreground = ${colors.muted}

[module/xwindow]
type = internal/xwindow
label = %title:0:70:...%
label-foreground = ${colors.foreground}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M
label = %date% %time%
label-foreground = ${colors.accent}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 2
format-volume = VOL <label-volume>
label-volume = %percentage%%
format-muted = VOL muted
label-muted-foreground = ${colors.muted}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
poll-interval = 5
full-at = 98
format-charging = BAT <label-charging>
format-discharging = BAT <label-discharging>
format-full = BAT full
label-charging = +%percentage%%
label-discharging = %percentage%%

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected = WIFI <label-connected>
label-connected = %signal%%
format-disconnected = WIFI down
label-disconnected-foreground = ${colors.muted}

[module/cpu]
type = internal/cpu
interval = 2
format = CPU <label>
label = %percentage%%

[module/memory]
type = internal/memory
interval = 5
format = MEM <label>
label = %percentage_used%%

[module/tray]
type = internal/tray
tray-spacing = 6px
format-margin = 4px

[settings]
screenchange-reload = true
pseudo-transparency = false
